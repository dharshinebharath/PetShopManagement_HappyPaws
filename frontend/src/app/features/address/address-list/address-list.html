<div class="min-h-screen bg-gradient-to-br from-blue-50 via-slate-50 to-indigo-50 p-10">

  <h2 class="text-3xl font-bold text-center text-blue-900 mb-8">
      Addresses
  </h2>

  <div class="flex justify-center">

    <div class="w-full max-w-5xl overflow-x-auto">

      <table class="w-full bg-white/90 shadow-lg rounded-2xl overflow-hidden">

        <!-- HEADER -->
        <thead class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
          <tr>
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Street</th>
            <th class="p-3 text-left">City</th>
            <th class="p-3 text-left">State</th>
            <th class="p-3 text-left">Zip Code</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>

          <tr *ngFor="let a of paginated(addressList)" class="border-b hover:bg-blue-50 transition">

            <td class="p-3 text-indigo-700 font-medium">
              {{ a.addressId }}
            </td>

            <td class="p-3 font-semibold text-blue-800">
              {{ a.street }}
            </td>

            <td class="p-3 text-slate-700">
              {{ a.city }}
            </td>

            <td class="p-3 text-slate-700">
              {{ a.state }}
            </td>

            <td class="p-3 text-emerald-700">
              {{ a.zipCode }}
            </td>

          </tr>

        </tbody>

      </table>

    </div>
  </div>
</div>
<app-pagination [totalItems]="addressList.length" [pageSize]="pageSize" [currentPage]="currentPage" (pageChange)="onPageChange($event)"></app-pagination>
