<div class="min-h-screen bg-gradient-to-br from-teal-50 via-slate-50 to-emerald-50 p-10">

    <h2 class="text-3xl font-bold text-center text-teal-900 mb-8">
        Employees List
    </h2>

    <div class="flex justify-center">

        <div class="w-full max-w-6xl overflow-x-auto">

            <table class="w-full bg-white/90 shadow-lg rounded-2xl overflow-hidden">

                <!-- HEADER -->
                <thead class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white">
                    <tr>
                        <th class="p-3 text-left">ID</th>
                        <th class="p-3 text-left">First Name</th>
                        <th class="p-3 text-left">Last Name</th>
                        <th class="p-3 text-left">Position</th>
                        <th class="p-3 text-left">Email</th>
                        <th class="p-3 text-left">Phone</th>
                        <th class="p-3 text-left">Hire Date</th>
                        <th class="p-3 text-left">Address ID</th>
                    </tr>
                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let e of paginated(employeeList)" class="border-b hover:bg-teal-50 transition">

                        <td class="p-3 text-blue-700 font-medium">
                            {{ e.employeeId }}
                        </td>

                        <td class="p-3 font-semibold text-teal-800">
                            {{ e.firstName }}
                        </td>

                        <td class="p-3 text-slate-700">
                            {{ e.lastName }}
                        </td>

                        <td class="p-3 text-emerald-700">
                            {{ e.position }}
                        </td>

                        <td class="p-3">
                            {{ e.email }}
                        </td>

                        <td class="p-3">
                            {{ e.phoneNumber }}
                        </td>

                        <td class="p-3">
                            {{ e.hireDate | date }}
                        </td>

                        <td class="p-3">
                            {{ e.addressId }}
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>
    </div>
</div>
<app-pagination [totalItems]="employeeList.length" [pageSize]="pageSize" [currentPage]="currentPage" (pageChange)="onPageChange($event)"></app-pagination>
