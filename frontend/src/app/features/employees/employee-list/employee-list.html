<div class="container">

  <div class="header">
    <h2>Employees</h2>

    <div class="actions">
      <input 
        type="text" 
        placeholder="Search..." 
        [(ngModel)]="searchText"
        class="search-box"
      >

      <button class="add-btn" (click)="openForm()">+ Add</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>ID</th>
        <th>Name</th>
        <th>Position</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Address</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let emp of filteredEmployees">
        <td>
          <img src="https://via.placeholder.com/40" class="avatar">
        </td>
        <td>{{emp.id}}</td>
        <td>{{emp.firstName}} {{emp.lastName}}</td>
        <td>{{emp.position}}</td>
        <td>{{emp.phone}}</td>
        <td>{{emp.email}}</td>
        <td>{{emp.address}}</td>
      </tr>
    </tbody>
  </table>

</div>
