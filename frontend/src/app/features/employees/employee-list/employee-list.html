<!-- This template renders the page layout for employee list. -->
<div class="min-h-full w-full bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 px-6 py-10">
  <div class="max-w-6xl mx-auto mb-8 text-center">
    <h2 class="text-4xl font-bold text-sage-900 tracking-tight">Employees List</h2>
    <p class="mt-2 text-sm text-stone-600">Structured employee records overview</p>
  </div>

  <div class="flex justify-center">
    <div class="w-full max-w-6xl">
      <div class="overflow-hidden rounded-2xl border border-stone-200 shadow-sm bg-white">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-stone-100 text-sage-900 border-b border-stone-200">
              <tr>
                <th class="p-4 text-left font-semibold">ID</th>
                <th class="p-4 text-left font-semibold">First Name</th>
                <th class="p-4 text-left font-semibold">Last Name</th>
                <th class="p-4 text-left font-semibold">Position</th>
                <th class="p-4 text-left font-semibold">Email</th>
                <th class="p-4 text-left font-semibold">Phone</th>
                <th class="p-4 text-left font-semibold">Hire Date</th>
                <th class="p-4 text-left font-semibold">Address ID</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-stone-100">
              <tr *ngFor="let e of paginated(employeeList)" class="hover:bg-stone-50 transition">
                <td class="p-4 font-medium text-sage-900">{{ e.employeeId }}</td>
                <td class="p-4 text-stone-700 font-medium">{{ e.firstName }}</td>
                <td class="p-4 text-stone-700">{{ e.lastName }}</td>
                <td class="p-4 text-stone-700">{{ e.position }}</td>
                <td class="p-4 text-stone-700">{{ e.email }}</td>
                <td class="p-4 text-stone-700">{{ e.phoneNumber }}</td>
                <td class="p-4 text-stone-700">{{ e.hireDate | date }}</td>
                <td class="p-4 text-stone-700">{{ e.addressId }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<app-pagination
  [totalItems]="employeeList.length"
  [pageSize]="pageSize"
  [currentPage]="currentPage"
  (pageChange)="onPageChange($event)">
</app-pagination>
