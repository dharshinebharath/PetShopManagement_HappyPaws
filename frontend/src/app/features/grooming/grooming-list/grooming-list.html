
<div class="min-h-screen bg-gradient-to-br from-teal-50 via-slate-50 to-emerald-50 p-10">

    <h2 class="text-3xl font-bold text-center text-teal-900 mb-8">
        Grooming Services
    </h2>

    <div class="flex justify-center">

        <div class="w-full max-w-5xl overflow-x-auto">

            <table class="w-full bg-white/90 shadow-lg rounded-2xl overflow-hidden">

                <!-- HEADER -->
                <thead class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white">
                    <tr>
                        <th class="p-3 text-left">ID</th>
                        <th class="p-3 text-left">Name</th>
                        <th class="p-3 text-left">Price</th>
                        <th class="p-3 text-left">Available</th>
                    </tr>
                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let g of groomingList" class="border-b hover:bg-teal-50 transition">

                        <td class="p-3 text-blue-700 font-medium">
                            {{ g.serviceId }}
                        </td>

                        <td class="p-3 font-semibold text-teal-800">
                            {{ g.name }}
                        </td>

                        <td class="p-3 text-emerald-700">
                            ₹ {{ g.price }}
                        </td>

                        <td class="p-3">
                            <span [ngClass]="g.available ? 'text-green-600' : 'text-red-500'">
                                {{ g.available ? 'Available' : 'Not Available' }}
                            </span>
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>
    </div>
</div>
