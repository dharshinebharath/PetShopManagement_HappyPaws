
<div class="min-h-screen flex items-center justify-center 
            bg-gradient-to-br from-slate-50 via-teal-50 to-emerald-50 p-6">

    <div class="w-full max-w-md bg-white/90 backdrop-blur-md 
              border border-teal-100 rounded-2xl shadow-lg p-8 space-y-4">

        <!-- TITLE -->
        <h2 class="text-2xl font-bold text-center text-teal-900 mb-4">
            Grooming Services API
        </h2>

        <!-- GET ALL -->
        <button (click)="goToList()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 
             hover:from-emerald-600 hover:to-teal-700 
             text-white py-2 rounded-lg shadow">
            GET All Grooming Services
        </button>

        <!-- GET BY ID  -->
        <div class="flex gap-2">
            <input #sid placeholder="Enter Service ID" class="border border-teal-200 p-2 rounded w-full 
               focus:outline-none focus:ring-2 focus:ring-teal-400">

            <button (click)="viewById(sid.value)"
                class="bg-teal-500 hover:bg-teal-600 text-white px-4 rounded-lg shadow">
                GET
            </button>
        </div>
<!-- -- POST -->
        <button routerLink="/grooming/form" class="w-full bg-gradient-to-r from-blue-500 to-teal-600 
             hover:from-blue-600 hover:to-teal-700 
             text-white py-2 rounded-lg shadow">
            Add Grooming Service (POST)
        </button>

        <!-- PUT -->
        <div class="flex gap-2">
            <input #uid placeholder="Enter Service ID for Update" class="border border-slate-300 p-2 rounded w-full 
               focus:outline-none focus:ring-2 focus:ring-blue-400">

            <button (click)="updateService(uid.value)"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 rounded-lg shadow">
                UPDATE
            </button>
        </div>

        <!-- DELETE -->
        <div class="flex gap-2">
            <input #did placeholder="Enter Service ID to Delete" class="border border-slate-300 p-2 rounded w-full 
               focus:outline-none focus:ring-2 focus:ring-red-400">

            <button (click)="deleteService(did.value)"
                class="bg-red-500 hover:bg-red-600 text-white px-4 rounded-lg shadow">
                DELETE
            </button>
        </div>

    </div>

</div>

<h2>Grooming Services</h2>

<!-- BASIC CRUD -->
<button (click)="getAll()">GET ALL</button>
<button (click)="getById()">GET BY ID</button>
<button (click)="create()">POST</button>
<button (click)="update()">PUT</button>
<button (click)="delete()">DELETE</button>

<br><br>

<!-- RELATIONSHIP -->
<h3>Pet ↔ Grooming Mapping</h3>

<input [(ngModel)]="petId" placeholder="Pet ID">
<input [(ngModel)]="serviceId" placeholder="Service ID">

<button (click)="assignService()">Assign Service</button>
<button (click)="getPetServices()">Get Pet Services</button>
<button (click)="removeService()">Remove Service</button>

<hr>
