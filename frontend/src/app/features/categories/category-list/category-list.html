<div class="min-h-screen bg-gradient-to-br from-teal-50 via-slate-50 to-emerald-50 p-10">

    <h2 class="text-3xl font-bold text-center text-teal-900 mb-8">
        Category Management
    </h2>

    <div class="flex justify-center">

        <div class="w-full max-w-5xl overflow-x-auto">

            <table class="w-full bg-white/90 shadow-xl rounded-2xl overflow-hidden">

                <!-- HEADER -->
                <thead class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white">
                    <tr>
                        <th class="p-3 text-left">Category ID</th>
                        <th class="p-3 text-left">Name</th>
                        
                    </tr>
                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let c of categoryList"
                        class="border-b hover:bg-teal-50 transition duration-200">

                        <td class="p-3 text-blue-700 font-semibold">
                            {{ c.category_id }}
                        </td>

                        <td class="p-3 font-bold text-teal-800">
                            {{ c.name }}
                        </td>

                       

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
