<div class="min-h-screen bg-gradient-to-br from-teal-50 via-slate-50 to-emerald-50 p-10">
  <h2 class="text-3xl font-bold text-center text-teal-900 mb-8">
    Suppliers
  </h2>

  <div class="flex justify-center">
    <div class="w-full max-w-6xl overflow-x-auto">
      <table class="w-full bg-white/90 shadow-lg rounded-2xl overflow-hidden">
        <thead class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white">
          <tr>
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Name</th>
            <th class="p-3 text-left">Contact Person</th>
            <th class="p-3 text-left">Phone</th>
            <th class="p-3 text-left">Email</th>
            <th class="p-3 text-left">Address ID</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let s of supplierList" class="border-b hover:bg-teal-50 transition">
            <td class="p-3 text-blue-700 font-medium">{{ s.supplierId }}</td>
            <td class="p-3 font-semibold text-teal-800">{{ s.name }}</td>
            <td class="p-3 text-slate-700">{{ s.contactPerson }}</td>
            <td class="p-3 text-slate-700">{{ s.phoneNumber }}</td>
            <td class="p-3 text-slate-700">{{ s.email }}</td>
            <td class="p-3 text-emerald-700">{{ s.addressId }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
