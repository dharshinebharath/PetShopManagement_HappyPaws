<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-50 via-slate-50 to-blue-100">
  <form
    [formGroup]="loginForm"
    (ngSubmit)="login()"
    class="w-[360px] rounded-2xl border border-teal-200 bg-white/90 p-8 shadow-lg backdrop-blur-md">
    <h2 class="mb-6 text-center text-2xl font-bold text-teal-900">
      Login
    </h2>

    <input
      type="text"
      placeholder="Username"
      formControlName="username"
      class="mb-4 w-full rounded-lg border border-teal-200 px-4 py-3 text-slate-700 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" />

    <p class="mb-4 text-sm text-red-500" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
      Username is required and must be at least 3 characters
    </p>

    <input
      type="password"
      placeholder="Password"
      formControlName="password"
      class="mb-6 w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-700 outline-none transition focus:border-blue-700 focus:ring-2 focus:ring-blue-200" />

    <p class="mb-6 text-sm text-red-500" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
      Password is required and must be at least 6 characters
    </p>

    <button
      type="submit"
      class="w-full rounded-lg bg-gradient-to-r from-teal-600 to-blue-800 py-3 font-semibold text-white shadow-md transition hover:from-teal-700 hover:to-blue-900">
      Login
    </button>
  </form>
</div>
