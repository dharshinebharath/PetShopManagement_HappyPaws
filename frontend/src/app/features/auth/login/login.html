
<div class="min-h-screen flex items-center justify-center 
            bg-gradient-to-br from-teal-50 via-slate-50 to-blue-100">

    <form [formGroup]="loginForm" (ngSubmit)="login()"
          class="w-[360px] bg-white/90 backdrop-blur-md 
          border border-teal-200 rounded-2xl shadow-lg p-8">

        <h2 class="text-2xl font-bold text-center text-teal-900 mb-6">
            Login
        </h2>

        <!-- Username -->
        <input type="text"
               placeholder="Username"
               formControlName="username"
               class="w-full mb-4 px-4 py-3 rounded-lg
               border border-teal-200 focus:border-teal-600
               focus:ring-2 focus:ring-teal-200 outline-none
               transition text-slate-700" />

        <!-- Password -->
        <input type="password"
               placeholder="Password"
               formControlName="password"
               class="w-full mb-6 px-4 py-3 rounded-lg
               border border-slate-300 focus:border-blue-700
               focus:ring-2 focus:ring-blue-200 outline-none
               transition text-slate-700" />

        <!-- Button -->
        <button type="submit"
                class="w-full bg-gradient-to-r from-teal-600 to-blue-800
                text-white font-semibold py-3 rounded-lg
                hover:from-teal-700 hover:to-blue-900
                transition shadow-md">
            Login
        </button>

    </form>

</div>
