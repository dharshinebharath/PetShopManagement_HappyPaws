<div class="min-h-screen bg-gradient-to-br from-green-50 to-blue-100 p-10 space-y-8">

    <h1 class="text-3xl text-center font-bold text-teal-900">
        Pet ↔ Vaccination Mapping
    </h1>

    <!-- ================= GET ================= -->
    <div class="bg-white p-6 rounded-2xl shadow w-[500px] mx-auto space-y-3">

        <h2 class="font-bold text-teal-700 text-center">View Vaccinations (GET)</h2>

        <div class="flex gap-3">
            <input [(ngModel)]="getPetId" placeholder="Enter Pet ID" class="w-full border p-2 rounded">

            <button (click)="viewVaccinations()" class="bg-blue-500 text-white px-5 rounded">
                View
            </button>
        </div>

    </div>

    <!-- ================= POST ================= -->
    <div class="bg-white p-6 rounded-2xl shadow w-[500px] mx-auto space-y-3">

        <h2 class="font-bold text-green-700 text-center">Assign Vaccination (POST)</h2>

        <div class="flex gap-3">
            <input [(ngModel)]="postPetId" placeholder="Pet ID" class="w-full border p-2 rounded">

            <input [(ngModel)]="postVaccinationId" placeholder="Vaccination ID" class="w-full border p-2 rounded">

            <button (click)="assign()" class="bg-green-500 text-white px-5 rounded">
                Assign
            </button>
        </div>

    </div>

    <!-- ================= DELETE ================= -->
    <div class="bg-white p-6 rounded-2xl shadow w-[500px] mx-auto space-y-3">

        <h2 class="font-bold text-red-600 text-center">Remove Vaccination (DELETE)</h2>

        <div class="flex gap-3">
            <input [(ngModel)]="deletePetId" placeholder="Pet ID" class="w-full border p-2 rounded">

            <input [(ngModel)]="deleteVaccinationId" placeholder="Vaccination ID" class="w-full border p-2 rounded">

            <button (click)="remove()" class="bg-red-500 text-white px-5 rounded">
                Delete
            </button>
        </div>

    </div>

</div>
