<!-- This template renders the page layout for pet vaccination dashboard. -->
<div class="min-h-screen bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 py-14 px-6">

    
    <div class="max-w-5xl mx-auto text-center mb-12">
        <h1 class="text-4xl md:text-4xl font-extrabold tracking-tight text-sage-900">
            Pet &harr; Vaccination Mapping
        </h1>
        <p class="mt-4 text-stone-600 text-lg max-w-2xl mx-auto">
            Manage vaccination assignments with structured and consistent control.
        </p>
    </div>

    
    <div class="max-w-2xl mx-auto space-y-6">

        
        <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition">

            <div class="mb-4">
                <h2 class="text-base font-semibold text-sage-900">View Vaccinations</h2>
                <p class="text-xs text-stone-500 mt-1">Retrieve vaccinations assigned to a pet</p>
            </div>

            <div class="flex items-center gap-3">
                <input [(ngModel)]="getPetId" placeholder="Pet ID"
                    class="flex-1 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-sage-300" />

                <button (click)="viewVaccinations()"
                    class="w-28 py-2 rounded-lg bg-stone-700 text-white text-sm font-medium hover:bg-stone-800 transition">
                    VIEW
                </button>
            </div>

        </div>

        
        <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition">

            <div class="mb-4">
                <h2 class="text-base font-semibold text-sage-900">Assign Vaccination</h2>
                <p class="text-xs text-stone-500 mt-1">Link a vaccination to a pet</p>
            </div>

            <div class="flex items-center gap-3">
                <input [(ngModel)]="postPetId" placeholder="Pet ID"
                    class="w-1/2 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-sage-300" />

                <input [(ngModel)]="postVaccinationId" placeholder="Vaccination ID"
                    class="w-1/2 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-sage-300" />

                <button (click)="assign()"
                    class="w-28 py-2 rounded-lg bg-stone-700 text-white text-sm font-medium hover:bg-stone-800 transition">
                    ASSIGN
                </button>
            </div>

        </div>

        
        <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition">

            <div class="mb-4">
                <h2 class="text-base font-semibold text-sage-900">Remove Mapping</h2>
                <p class="text-xs text-stone-500 mt-1">Unlink vaccination from a pet</p>
            </div>

            <div class="flex items-center gap-3">
                <input [(ngModel)]="deletePetId" placeholder="Pet ID"
                    class="w-1/2 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-sage-300" />

                <input [(ngModel)]="deleteVaccinationId" placeholder="Vaccination ID"
                    class="w-1/2 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-sage-300" />

                <button (click)="remove()"
                    class="w-28 py-2 rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600 transition">
                    REMOVE
                </button>
            </div>

        </div>

    </div>
</div>
