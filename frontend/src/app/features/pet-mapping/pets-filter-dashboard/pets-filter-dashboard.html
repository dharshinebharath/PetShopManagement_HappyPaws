<!-- This template renders the page layout for pets filter dashboard. -->
<div
  class="min-h-full w-full bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 py-14 px-6 flex justify-center items-start pt-8 pb-8">

  <div class="w-full max-w-2xl">

    
    <div class="text-center mb-10">
      <h2 class="text-4xl font-extrabold tracking-tight text-sage-900">
        Pet Filter API Console
      </h2>
      <p class="mt-3 text-stone-600 text-lg">
        Structured and consistent pet search & filter dashboard
      </p>
    </div>

    
    <div class="space-y-5">

      
      <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm">
        <h3 class="text-sm font-semibold text-sage-900">Filter by Category</h3>
        <p class="text-xs text-stone-500 mt-1 mb-4">Search pets using category ID</p>

        <div class="flex gap-3">
          <input [(ngModel)]="categoryId" placeholder="Category ID" class="flex-1 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm
            text-stone-800 focus:outline-none focus:ring-1 focus:ring-sage-300" />

          <button (click)="byCategory()" class="w-32 py-2.5 rounded-lg bg-stone-700 text-stone-100 text-sm font-medium
            hover:bg-stone-800 transition">
            SEARCH
          </button>
        </div>
      </div>

      
      <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm">
        <h3 class="text-sm font-semibold text-sage-900">Filter by Breed</h3>
        <p class="text-xs text-stone-500 mt-1 mb-4">Search pets using breed selection</p>

        <div class="flex gap-3">
          <select [(ngModel)]="breed" class="flex-1 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm
            text-stone-800 focus:outline-none focus:ring-1 focus:ring-sage-300">
            <option value="">Select Breed</option>
            <option *ngFor="let b of breedOptions" [value]="b">{{ b }}</option>
          </select>

          <button (click)="byBreed()" class="w-32 py-2.5 rounded-lg bg-stone-700 text-stone-100 text-sm font-medium
            hover:bg-stone-800 transition">
            SEARCH
          </button>
        </div>
      </div>

      
      <div class="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm">
        <h3 class="text-sm font-semibold text-sage-900">Filter by Price</h3>
        <p class="text-xs text-stone-500 mt-1 mb-4">Search pets within price range</p>

        <div class="flex gap-3">
          <input [(ngModel)]="min" placeholder="Min Price" class="flex-1 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm
            text-stone-800 focus:outline-none focus:ring-1 focus:ring-sage-300" />

          <input [(ngModel)]="max" placeholder="Max Price" class="flex-1 rounded-lg border border-stone-300 bg-stone-50 px-3 py-2 text-sm
            text-stone-800 focus:outline-none focus:ring-1 focus:ring-sage-300" />

          <button (click)="byPrice()" class="w-32 py-2.5 rounded-lg bg-stone-700 text-stone-100 text-sm font-medium
            hover:bg-stone-800 transition">
            SEARCH
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
