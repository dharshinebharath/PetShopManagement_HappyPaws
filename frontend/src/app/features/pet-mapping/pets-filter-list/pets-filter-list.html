<!-- This template renders the page layout for pets filter list. -->
<div class="min-h-full w-full bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 px-6 py-10">


  <div class="max-w-5xl mx-auto mb-8 text-center">
    <h2 class="text-4xl font-bold text-sage-900 tracking-tight">
      Pet Filter Results
    </h2>
    <p class="mt-2 text-sm text-stone-600">
      Structured and filtered pet records overview
    </p>
  </div>


  <div class="flex justify-center">
    <div class="w-full max-w-5xl">

      <div class="overflow-hidden rounded-2xl border border-stone-200 shadow-sm bg-white">

        <div class="overflow-x-auto">

          <table class="w-full text-sm">


            <thead class="bg-stone-100 text-sage-900 border-b border-stone-200">
              <tr>
                <th class="p-4 text-left font-semibold">Pet ID</th>
                <th class="p-4 text-left font-semibold">Name</th>
                <th class="p-4 text-left font-semibold">Breed</th>
                <th class="p-4 text-left font-semibold">Price</th>
              </tr>
            </thead>


            <tbody class="divide-y divide-stone-100">
              @for (p of paginated(pets); track p.pet_id) {
              <tr class="hover:bg-stone-50 transition">
                <td class="p-4 font-medium text-sage-900">{{ p.pet_id }}</td>
                <td class="p-4 text-stone-700 font-medium">{{ p.name }}</td>
                <td class="p-4 text-stone-600">{{ p.breed }}</td>
                <td class="p-4">
                  <span class="px-3 py-1 rounded-full bg-sage-100 text-sage-800 text-xs font-medium">
                    ₹ {{ p.price }}
                  </span>
                </td>
              </tr>
              } @empty {
              <tr>
                <td colspan="4" class="p-4 text-center text-stone-500 text-lg">No pets found</td>
              </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>


<div class="mt-6 flex justify-center">
  <app-pagination [totalItems]="pets.length" [pageSize]="pageSize" [currentPage]="currentPage"
    (pageChange)="onPageChange($event)">
  </app-pagination>
</div>
