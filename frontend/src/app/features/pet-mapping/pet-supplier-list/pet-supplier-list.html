<!-- This template renders the page layout for pet supplier list. -->
<div class="min-h-full w-full bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 px-6 py-10">
  <div class="max-w-4xl mx-auto mb-8 text-center">
    <h2 class="text-4xl font-bold text-sage-900 tracking-tight">Assigned Suppliers</h2>
    <p class="mt-2 text-sm text-stone-600">Structured pet supplier mapping overview</p>
  </div>
  <div class="flex justify-center">
    <div class="w-full max-w-4xl">
      <div class="overflow-hidden rounded-2xl border border-stone-200 shadow-sm bg-white">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-stone-100 text-sage-900 border-b border-stone-200">
              <tr>
                <th class="p-4 text-left font-semibold">Supplier ID</th>
                <th class="p-4 text-left font-semibold">Name</th>
                <th class="p-4 text-left font-semibold">Contact Person</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-stone-100">
              @for (s of paginated(suppliers); track s.supplierId) {
                <tr class="hover:bg-stone-50 transition">
                  <td class="p-4 font-medium text-sage-900">{{ s.supplierId }}</td>
                  <td class="p-4 text-stone-700 font-medium">{{ s.name }}</td>
                  <td class="p-4 text-stone-700">{{ s.contactPerson }}</td>
                </tr>
              } @empty {
                <tr>
                  <td colspan="3" class="p-4 text-center text-stone-600 text-lg">No suppliers assigned</td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<app-pagination [totalItems]="suppliers.length" [pageSize]="pageSize" [currentPage]="currentPage" (pageChange)="onPageChange($event)"></app-pagination>
