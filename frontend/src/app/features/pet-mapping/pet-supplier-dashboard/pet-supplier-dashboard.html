<!-- This template renders the page layout for pet supplier dashboard. -->
<div class="min-h-full w-full bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 py-12 px-6">

  
  <div class="max-w-4xl mx-auto text-center mb-10">
    <h1 class="text-4xl font-extrabold tracking-tight text-sage-900">
      Pet &harr; Supplier Mapping
    </h1>
    <p class="mt-3 text-stone-600 text-base max-w-2xl mx-auto">
      Manage supplier assignments for pets with structured operational control and clear traceability.
    </p>
  </div>

  
  <div class="max-w-2xl mx-auto space-y-6">

    
    <div class="bg-white border border-stone-200 rounded-xl p-5 shadow-sm hover:shadow-md transition">

      <div class="mb-3">
        <h2 class="text-sm font-semibold text-sage-900">View Assigned Suppliers</h2>
        <p class="text-xs text-stone-500">Fetch supplier records linked to a pet</p>
      </div>

      <div class="flex gap-3 items-center">
        <input [(ngModel)]="getPetId" placeholder="Enter Pet ID" class="flex-1 rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800
          focus:outline-none focus:ring-1 focus:ring-sage-400 focus:border-sage-400" />

        <button (click)="viewSuppliers()" class="px-5 py-2 rounded-md bg-stone-700 text-stone-100 text-sm font-medium
          hover:bg-stone-800 transition shadow-sm">
          VIEW
        </button>
      </div>

    </div>

    
    <div class="bg-white border border-stone-200 rounded-xl p-5 shadow-sm hover:shadow-md transition">

      <div class="mb-3">
        <h2 class="text-sm font-semibold text-sage-900">Assign Supplier</h2>
        <p class="text-xs text-stone-500">Link a supplier to a pet record</p>
      </div>

      <div class="flex gap-3 items-center">
        <input [(ngModel)]="postPetId" placeholder="Pet ID" class="flex-1 rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800
          focus:outline-none focus:ring-1 focus:ring-sage-400 focus:border-sage-400" />

        <input [(ngModel)]="postSupplierId" placeholder="Supplier ID" class="flex-1 rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800
          focus:outline-none focus:ring-1 focus:ring-sage-400 focus:border-sage-400" />

        <button (click)="assign()" class="px-5 py-2 rounded-md bg-stone-700 text-stone-100 text-sm font-medium
          hover:bg-stone-800 transition shadow-sm">
          ASSIGN
        </button>
      </div>

    </div>

  </div>
</div>
