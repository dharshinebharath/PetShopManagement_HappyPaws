<!-- This template renders the page layout for pet employees list. -->
<div class="min-h-full w-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-10">

    <h2 class="text-2xl font-bold text-center mb-6 text-slate-100">
        Employees Assigned to Pet
    </h2>

    <div class="flex justify-center">

        <table class="w-full max-w-3xl bg-slate-800 rounded-2xl shadow overflow-hidden border border-slate-700">


            <thead class="bg-slate-700 text-cyan-400">
                <tr>
                    <th class="p-3">Employee ID</th>
                    <th class="p-3">First Name</th>
                    <th class="p-3">Position</th>
                </tr>
            </thead>


            <tbody class="divide-y divide-slate-700">
                @for (e of paginated(employees); track e.employeeId) {
                <tr class="hover:bg-slate-700 transition">
                    <td class="p-3 text-center text-slate-300">{{ e.employeeId }}</td>
                    <td class="p-3 text-center text-slate-300">{{ e.firstName }}</td>
                    <td class="p-3 text-center text-slate-300">{{ e.position }}</td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="3" class="p-4 text-center text-slate-300 text-lg">No employees assigned</td>
                </tr>
                }
            </tbody>

    </div>
    <app-pagination [totalItems]="employees.length" [pageSize]="pageSize" [currentPage]="currentPage"
        (pageChange)="onPageChange($event)"></app-pagination>
