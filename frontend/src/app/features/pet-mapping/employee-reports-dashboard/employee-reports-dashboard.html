<!-- This template renders the page layout for employee reports dashboard. -->
<div class="min-h-full w-full bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 py-12 px-6">

    
    <div class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-extrabold tracking-tight text-sage-900">
            Employee Reports
        </h1>
        <p class="mt-3 text-stone-600 text-base max-w-2xl mx-auto">
            Generate structured internal reports based on employee roles and hiring timelines.
        </p>
    </div>

    
    <div class="max-w-2xl mx-auto space-y-6">

        
        <div class="bg-white border border-stone-200 rounded-xl p-6 shadow-sm hover:shadow-md transition">

            <div class="mb-5 ">
                <h2 class="text-md font-semibold text-sage-900">
                    Employees by Role
                </h2>
                <p class="text-xs text-stone-500">
                    Filter employees based on assigned role
                </p>
            </div>

            <div class="flex gap-3 items-center">
                <select [(ngModel)]="role" class="flex-1 rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800
          focus:outline-none focus:ring-1 focus:ring-sage-400 focus:border-sage-400">

                    <option value="">Select Role</option>
                    <option *ngFor="let r of roleOptions" [value]="r">{{ r }}</option>
                </select>

                <button (click)="getByRole()" class="px-5 py-2 rounded-md bg-stone-700 text-stone-100 text-sm font-medium
          hover:bg-stone-800 transition shadow-sm">
                    SEARCH
                </button>
            </div>

        </div>

        
        <div class="bg-white border border-stone-200 rounded-xl p-6 shadow-sm hover:shadow-md transition">

            <div class="mb-4 ">
                <h2 class="text-md font-semibold text-sage-900">
                    Employees Hired After
                </h2>
                <p class="text-xs text-stone-500">
                    Filter employees based on hiring date
                </p>
            </div>

            <div class="flex gap-3 items-center">
                <input type="date" [(ngModel)]="date" class="flex-1 rounded-md border border-stone-300 bg-stone-50 px-3 py-2 text-sm text-stone-800
          focus:outline-none focus:ring-1 focus:ring-sage-400 focus:border-sage-400">

                <button (click)="getByDate()" class="px-5 py-2 rounded-md bg-stone-700 text-stone-100 text-sm font-medium
          hover:bg-stone-800 transition shadow-sm">
                    SEARCH
                </button>
            </div>

        </div>

    </div>

</div>
