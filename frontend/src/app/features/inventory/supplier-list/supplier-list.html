<h3>Supplier List</h3>

<table border="1" width="100%">
  <tr>
    <th>Name</th>
    <th>Contact</th>
    <th>Phone</th>
    <th>Email</th>
  </tr>

  <tr *ngFor="let s of filteredSuppliers">
    <td>{{ s.name }}</td>
    <td>{{ s.contact }}</td>
    <td>{{ s.phone }}</td>
    <td>{{ s.email }}</td>
  </tr>
</table>

<div class="form" *ngIf="showForm">
  <h4>Add Supplier</h4>

  <input [(ngModel)]="newSupplier.name" placeholder="Name" />
  <input [(ngModel)]="newSupplier.contact" placeholder="Contact" />
  <input [(ngModel)]="newSupplier.phone" placeholder="Phone" />
  <input [(ngModel)]="newSupplier.email" placeholder="Email" />

  <button (click)="addSupplier()">Save</button>
  <button (click)="closeForm.emit()">Close</button>
</div>
