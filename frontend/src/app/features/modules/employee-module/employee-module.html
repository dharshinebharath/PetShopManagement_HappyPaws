<div class="module-container">

  <h1>Employees & Internal Operations</h1>

  <button class="description-btn" (click)="goToDashboard()">

    <p>
      This module manages the internal workforce of the pet shop and handles day-to-day operations.
      You can perform employee management such as adding, updating, deleting, and viewing employee records.
    </p>

    <p>
      It also allows assigning employees to pets, tracking responsibilities,
      and generating reports based on roles and hiring dates.
    </p>

    <ul>
      <li>✔ Manage employee records (CRUD operations)</li>
      <li>✔ Assign pets to employees</li>
      <li>✔ Track employee–pet relationships</li>
      <li>✔ Generate reports by role and hiring date</li>
    </ul>

  </button>

</div>
