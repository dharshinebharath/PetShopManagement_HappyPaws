<!-- This template renders the page layout for transaction list. -->
<div class="min-h-full w-full bg-gradient-to-br from-stone-50 via-stone-100 to-sage-50 px-6 py-10">
  <div class="max-w-6xl mx-auto mb-8 text-center"><h2 class="text-4xl font-bold text-sage-900 tracking-tight">Transactions</h2><p class="mt-2 text-sm text-stone-600">Structured transaction records overview</p></div>
  <div class="flex justify-center"><div class="w-full max-w-6xl"><div class="overflow-hidden rounded-2xl border border-stone-200 shadow-sm bg-white"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-stone-100 text-sage-900 border-b border-stone-200"><tr><th class="p-4 text-left font-semibold">ID</th><th class="p-4 text-left font-semibold">Date</th><th class="p-4 text-left font-semibold">Amount</th><th class="p-4 text-left font-semibold">Status</th><th class="p-4 text-left font-semibold">Customer</th><th class="p-4 text-left font-semibold">Pet</th></tr></thead><tbody class="divide-y divide-stone-100"><tr *ngFor="let t of paginated(transactionList)" class="hover:bg-stone-50 transition"><td class="p-4 font-medium text-sage-900">{{ t.transactionId }}</td><td class="p-4 text-stone-700">{{ t.transactionDate }}</td><td class="p-4 text-stone-700"><span class="px-3 py-1 rounded-full bg-stone-100 text-stone-700 text-xs font-medium">Rs. {{ t.amount }}</span></td><td class="p-4 text-stone-700">{{ t.transactionStatus }}</td><td class="p-4 text-stone-700">{{ t.customerId }}</td><td class="p-4 text-stone-700">{{ t.petId }}</td></tr></tbody></table></div></div></div></div>
</div>
<app-pagination [totalItems]="transactionList.length" [pageSize]="pageSize" [currentPage]="currentPage" (pageChange)="onPageChange($event)"></app-pagination>
