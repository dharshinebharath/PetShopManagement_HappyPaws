<div class="min-h-screen bg-gradient-to-br from-teal-50 via-slate-50 to-emerald-50 p-10">

  <h2 class="text-3xl font-bold text-center text-teal-900 mb-8">
      Transactions
  </h2>

  <div class="flex justify-center">

    <div class="w-full max-w-6xl overflow-x-auto">

      <table class="w-full bg-white/90 shadow-lg rounded-2xl overflow-hidden">

        <!-- HEADER -->
        <thead class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white">
          <tr>
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Date</th>
            <th class="p-3 text-left">Amount</th>
            <th class="p-3 text-left">Status</th>
            <th class="p-3 text-left">Customer</th>
            <th class="p-3 text-left">Pet</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>

          <tr *ngFor="let t of transactionList"
              class="border-b hover:bg-teal-50 transition">

            <td class="p-3 text-blue-700 font-medium">
              {{ t.transactionId }}
            </td>

            <td class="p-3">
              {{ t.transactionDate }}
            </td>

            <td class="p-3 text-emerald-700">
              ₹ {{ t.amount }}
            </td>

            <td class="p-3">
              <span 
                [ngClass]="
                  t.transactionStatus === 'SUCCESS' ? 'text-green-600' :
                  t.transactionStatus === 'FAILED' ? 'text-red-500' :
                  'text-yellow-500'
                ">
                {{ t.transactionStatus }}
              </span>
            </td>

            <td class="p-3">
          {{ t.customerId }}

            </td>

            <td class="p-3">
            
{{ t.petId }}
            </td>

          </tr>

        </tbody>

      </table>

    </div>
  </div>
</div>
