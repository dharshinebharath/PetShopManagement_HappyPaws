<div class="p-6 max-w-md mx-auto bg-white shadow-lg rounded-2xl">

  <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">
    {{ transactionId ? 'Update Transaction' : 'Add Transaction' }}
  </h2>

  <!-- 💰 Amount -->
  <label class="block text-sm font-medium text-gray-600 mb-1">
    Amount
  </label>
  <input
    [(ngModel)]="formData.amount"
    type="number"
    placeholder="Enter amount (e.g. 500)"
    class="border rounded-lg p-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
  />

  <!-- 📅 Transaction Date -->
  <label class="block text-sm font-medium text-gray-600 mb-1">
    Transaction Date
  </label>
  <input
    [(ngModel)]="formData.transactionDate"
    type="date"
    class="border rounded-lg p-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
  />

  <!-- 📌 Status -->
  <label class="block text-sm font-medium text-gray-600 mb-1">
    Status
  </label>
  <select
    [(ngModel)]="formData.transactionStatus"
    class="border rounded-lg p-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
  >
    <option value="" disabled selected>Select status</option>
    <option value="SUCCESS">SUCCESS</option>
    <option value="FAILED">FAILED</option>
    <option value="PENDING">PENDING</option>
  </select>

  <!-- 👤 Customer ID -->
  <label class="block text-sm font-medium text-gray-600 mb-1">
    Customer ID
  </label>
  <input
    [(ngModel)]="formData.customerId"
    type="number"
    placeholder="Enter customer ID"
    class="border rounded-lg p-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
  />

  <!-- 🐾 Pet ID -->
  <label class="block text-sm font-medium text-gray-600 mb-1">
    Pet ID
  </label>
  <input
    [(ngModel)]="formData.petId"
    type="number"
    placeholder="Enter pet ID"
    class="border rounded-lg p-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-green-400"
  />

  <!-- 🚀 Submit Button -->
  <button
    (click)="submit()"
    class="bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded-lg w-full transition"
  >
    Submit Transaction
  </button>

</div>cd
