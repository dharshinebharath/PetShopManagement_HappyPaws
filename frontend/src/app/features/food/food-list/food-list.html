<div class="min-h-screen bg-gradient-to-br from-teal-50 via-slate-50 to-emerald-50 p-10">
  <h2 class="text-3xl font-bold text-center text-teal-900 mb-8">
    Pet Food Items
  </h2>

  <div class="flex justify-center">
    <div class="w-full max-w-6xl overflow-x-auto">
      <table class="w-full bg-white/90 shadow-lg rounded-2xl overflow-hidden">
        <thead class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white">
          <tr>
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Name</th>
            <th class="p-3 text-left">Brand</th>
            <th class="p-3 text-left">Type</th>
            <th class="p-3 text-left">Quantity</th>
            <th class="p-3 text-left">Price</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let f of paginated(foodList)" class="border-b hover:bg-teal-50 transition">
            <td class="p-3 text-blue-700 font-medium">{{ f.foodId }}</td>
            <td class="p-3 font-semibold text-teal-800">{{ f.name }}</td>
            <td class="p-3 text-slate-700">{{ f.brand }}</td>
            <td class="p-3 text-slate-700">{{ f.type }}</td>
            <td class="p-3 text-emerald-700">{{ f.quantity }}</td>
            <td class="p-3 text-emerald-700">₹ {{ f.price }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<app-pagination [totalItems]="foodList.length" [pageSize]="pageSize" [currentPage]="currentPage" (pageChange)="onPageChange($event)"></app-pagination>
