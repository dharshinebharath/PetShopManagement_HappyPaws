<div class="min-h-screen flex items-center justify-center 
 bg-gradient-to-br from-slate-50 via-teal-50 to-emerald-50 p-6">

  <div class="w-full max-w-md bg-white/90 backdrop-blur-md 
   border border-teal-100 rounded-2xl shadow-lg p-8 space-y-4">

    <h2 class="text-2xl font-bold text-center text-teal-900 mb-4">
      Pet Food API
    </h2>

    <!-- GET ALL -->
    <button (click)="goToList()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 
     text-white py-2 rounded-lg shadow">
      GET All Food
    </button>

    <!-- GET BY ID -->
    <div class="flex gap-2">
      <input #fid placeholder="Enter Food ID" class="border p-2 rounded w-full">
      <button (click)="viewById(fid.value)" class="bg-teal-500 text-white px-4 rounded-lg">
        GET
      </button>
    </div>

    <!-- POST -->
    <button  class="w-full bg-gradient-to-r from-blue-500 to-teal-600 
     text-white py-2 rounded-lg shadow" (click)="addFood()">
      Add Food (POST)
    </button>
    <!-- <button (click)="addFood()">Add Food</button> -->

    <!-- PUT -->
    <div class="flex gap-2">
      <input #uid placeholder="Enter Food ID for Update" class="border p-2 rounded w-full">
      <button (click)="updateFood(uid.value)" class="bg-blue-500 text-white px-4 rounded-lg">
        UPDATE
      </button>
    </div>

    <!-- DELETE -->
    <div class="flex gap-2">
      <input #did placeholder="Enter Food ID to Delete" class="border p-2 rounded w-full">
      <button (click)="deleteFood(did.value)" class="bg-red-500 text-white px-4 rounded-lg">
        DELETE
      </button>
    </div>

  </div>
</div>
