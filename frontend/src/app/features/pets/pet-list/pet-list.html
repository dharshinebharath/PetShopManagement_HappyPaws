<div class="min-h-screen bg-gradient-to-br from-teal-50 via-slate-50 to-emerald-50 p-10">

    <h2 class="text-3xl font-bold text-center text-teal-900 mb-8">
        Pets Management
    </h2>

    <div class="flex justify-center">

        <div class="w-full max-w-7xl overflow-x-auto">

            <table class="w-full bg-white/90 shadow-xl rounded-2xl overflow-hidden">

                <!-- HEADER -->
                <thead class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white">
                    <tr>
                        <th class="p-3 text-left">Pet ID</th>
                        <th class="p-3 text-left">Name</th>
                        <th class="p-3 text-left">Breed</th>
                        <th class="p-3 text-left">Age</th>
                        <th class="p-3 text-left">Price</th>
                        <th class="p-3 text-left">Description</th>
                        <th class="p-3 text-left">Category ID</th>
                        <th class="p-3 text-left">Category Name</th>
                    </tr>
                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let p of paginated(petsList)" 
                        class="border-b hover:bg-teal-50 transition duration-200">

                        <!-- PET ID -->
                        <td class="p-3 text-blue-700 font-semibold">
                            {{ p.pet_id }}
                        </td>

                        <!-- NAME -->
                        <td class="p-3 font-bold text-teal-800">
                            {{ p.name }}
                        </td>

                        <!-- BREED -->
                        <td class="p-3 text-gray-700">
                            {{ p.breed }}
                        </td>

                        <!-- AGE -->
                        <td class="p-3 text-gray-700">
                            {{ p.age }}
                        </td>

                        <!-- PRICE -->
                        <td class="p-3 text-emerald-700 font-semibold">
                            ₹ {{ p.price }}
                        </td>

                        <!-- DESCRIPTION -->
                        <td class="p-3 text-gray-600 max-w-xs truncate">
                            {{ p.description }}
                        </td>

                        <!-- CATEGORY ID -->
                        <td class="p-3 text-purple-700 font-medium">
                            {{ p.category_id }}
                        </td>

                        <!-- CATEGORY NAME -->
                        <td class="p-3 text-green-700 font-semibold">
                            {{ p.categoryName }}
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
<app-pagination [totalItems]="petsList.length" [pageSize]="pageSize" [currentPage]="currentPage" (pageChange)="onPageChange($event)"></app-pagination>
