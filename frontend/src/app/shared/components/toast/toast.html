<!-- This template renders the shared UI for toast. -->
@if (notification.notification(); as current) {
  <div
    class="fixed right-4 top-24 z-[60] flex w-[min(420px,calc(100vw-2rem))] items-center gap-3 rounded-2xl border border-stone-200 bg-white/95 p-4 text-sage-900 shadow-lg"
    role="status"
    aria-live="polite">
    <div class="flex h-10 w-10 items-center justify-center rounded-full bg-stone-100 text-sage-700" aria-hidden="true">
      <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24" focusable="false">
        <path d="M9.55 18.2 4.8 13.45l1.4-1.4 3.35 3.35 8.25-8.25 1.4 1.4Z" />
      </svg>
    </div>

    <div class="flex-1 text-sm font-medium text-sage-900">{{ current.message }}</div>

    <button
      type="button"
      class="rounded-lg border border-stone-200 bg-stone-50 px-4 py-2 text-sage-900 shadow-sm transition duration-300 hover:bg-stone-100"
      (click)="dismiss()"
      aria-label="Close notification">
      x
    </button>
  </div>
}
