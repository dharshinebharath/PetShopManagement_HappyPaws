<!-- This template renders the shared UI for pagination. -->
@if (totalItems > pageSize) {
  <div class="mt-5 flex items-center justify-center gap-2">
    <button
      (click)="goTo(currentPage - 1)"
      [disabled]="currentPage === 1"
      class="rounded-lg border border-stone-200 bg-white px-4 py-2 text-sage-900 shadow-sm transition duration-300 hover:bg-stone-100">
      Prev
    </button>

    @for (p of pages; track p) {
      <button
        (click)="goTo(p)"
        [ngClass]="p === currentPage
          ? 'rounded-lg border border-stone-200 bg-stone-700 px-4 py-2 text-stone-100 shadow-sm transition duration-300'
          : 'rounded-lg border border-stone-200 bg-white px-4 py-2 text-sage-900 shadow-sm transition duration-300 hover:bg-stone-100'">
        {{ p }}
      </button>
    }

    <button
      (click)="goTo(currentPage + 1)"
      [disabled]="currentPage === totalPages"
      class="rounded-lg border border-stone-200 bg-white px-4 py-2 text-sage-900 shadow-sm transition duration-300 hover:bg-stone-100">
      Next
    </button>
  </div>
}
